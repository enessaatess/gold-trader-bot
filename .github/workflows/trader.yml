# Altın Trader Bot - GitHub Actions Workflow
# Her 15 dakikada bir (Pazartesi-Cuma) çalışır

name: Gold Trader Bot

on:
  schedule:
    # UTC saatiyle her 15 dakika — sadece Pazartesi-Cuma
    # Altın piyasası UTC 00:00-22:00 arası aktif (market_hours.py ikinci kontrol yapar)
    - cron: '*/15 0-22 * * 1-5'
  workflow_dispatch:
    inputs:
      command:
        description: 'Manuel komut (status/pause/resume)'
        required: false
        default: 'status'

jobs:
  run-trader:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt

      - name: Önceki veritabanını indir (artifact)
        uses: actions/download-artifact@v4
        with:
          name: portfolio-db
          path: data/
        continue-on-error: true   # İlk çalışmada artifact yoktur, hata verme

      - name: Botu çalıştır
        env:
          GOLDAPI_KEY: ${{ secrets.GOLDAPI_KEY }}
          OPENEXCHANGE_KEY: ${{ secrets.OPENEXCHANGE_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          INITIAL_GOLD_GRAMS: ${{ secrets.INITIAL_GOLD_GRAMS }}
          INITIAL_CASH_TRY: ${{ secrets.INITIAL_CASH_TRY }}
          MAX_POSITION_PCT: "0.05"
          STOP_LOSS_PCT: "0.10"
          MAX_DAILY_TRADES: "8"
          MIN_CONFIDENCE: "0.55"
        run: python main.py

      - name: Veritabanını artifact olarak kaydet
        uses: actions/upload-artifact@v4
        if: always()    # Hata olsa bile kaydet
        with:
          name: portfolio-db
          path: data/portfolio.db
          retention-days: 35    # 30 gün + 5 gün tampon